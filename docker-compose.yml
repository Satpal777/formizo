services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    container_name: formizo-api
    env_file:
      - apps/api/.env
      - path: apps/api/.env.docker
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-9000}
    ports:
      - "${API_PORT:-9000}:9000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:9000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
